<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPS Academy Group of Educational Institutes | Career Solution Magazine</title>

<style>

:root{
--primary:#d32f2f;
--dark:#111;
--light:#f4f6f9;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--light);

/* FIX FOR FOOTER POSITION */
display:flex;
flex-direction:column;
min-height:100vh;
}

/* MAIN CONTENT AREA */
main{
flex:1;
}

/* NAVBAR */

.navbar{
background:#ffffff;
text-align:center;
padding:10px;
border-bottom:1px solid #ddd;
}

.navbar img{
max-width:200px;
width:100%;
height:auto;
display:block;
margin:auto;
}

/* HERO */

.hero{
background:linear-gradient(rgba(211,47,47,0.95), rgba(183,28,28,0.95));
color:white;
text-align:center;
padding:45px 20px;
}

.hero h1{
font-size:1.6rem;
margin-bottom:8px;
}

.hero p{
font-size:0.95rem;
opacity:0.9;
}

/* CARD */

.card{
background:white;
max-width:500px;
margin:-40px auto 60px;
padding:30px 25px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
margin-bottom:12px;
font-size:1.3rem;
}

.card p{
color:#555;
margin-bottom:22px;
font-size:0.95rem;
}

/* BUTTON */

.btn{
display:inline-block;
padding:12px 26px;
background:var(--primary);
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
background:#b71c1c;
transform:scale(1.05);
}

/* FOOTER */

footer{
text-align:center;
padding:22px;
background:var(--dark);
color:white;
font-size:0.9rem;
}

/* MOBILE */

@media(max-width:768px){

.hero{
padding:35px 20px;
}

.hero h1{
font-size:1.3rem;
}

.card{
margin:-30px 20px 50px;
padding:25px 20px;
}

}

</style>
</head>

<body>

<div class="navbar">
<img src="images/logo.png" alt="IPS Academy Logo">
</div>

<main>

<div class="hero">
<h1>Career Solution Magazine</h1>
<p>Official Monthly Career Guidance Publication</p>
</div>

<div class="card">

<h2>Register to Access Magazine</h2>

<p>
Students must complete the registration form 
before accessing the digital magazine editions.
</p>

<a class="btn"
href="https://docs.google.com/forms/d/e/1FAIpQLSdT20qAjb5lVCW1Z-tyvDCnj49dNQ_HcuuCNluuAKbZM-xK1w/viewform"
target="_blank">
Register Now
</a>

</div>

</main>

<footer>
© 2026 IPS Academy Group of Educational Institutes | All Rights Reserved
</footer>

</body>
</html>
